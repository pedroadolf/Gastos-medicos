global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gmm-nextjs'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['tasks.antigravity-gmm-yqol3g:3000']
    relabel_configs:
      - target_label: 'service'
        replacement: 'gmm-app'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
